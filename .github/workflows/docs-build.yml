name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs*.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true
      - name: Build documentation
        run: hugo --minify
        working-directory: docs
