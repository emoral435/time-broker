name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - ".github/workflows/lint.yml"
      - ".golangci.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.go"
      - ".github/workflows/lint.yml"
      - ".golangci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: v1.25.8

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v1.25.8
