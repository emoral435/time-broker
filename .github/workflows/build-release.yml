name: Build Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version variables
        id: vars
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${{ steps.vars.outputs.version }}"

          XFLAGS="-X main.Version=${VERSION}"

          mkdir -p dist

          GOOS=darwin GOARCH=arm64 go build -ldflags "$XFLAGS" -o dist/time-broker ./cmd/time-broker/
          tar -czf "dist/time-broker-${TAG}-darwin-arm64.tar.gz" -C dist time-broker
          rm dist/time-broker

          GOOS=darwin GOARCH=amd64 go build -ldflags "$XFLAGS" -o dist/time-broker ./cmd/time-broker/
          tar -czf "dist/time-broker-${TAG}-darwin-amd64.tar.gz" -C dist time-broker
          rm dist/time-broker

          GOOS=linux GOARCH=arm64 go build -ldflags "$XFLAGS" -o dist/time-broker ./cmd/time-broker/
          tar -czf "dist/time-broker-${TAG}-linux-arm64.tar.gz" -C dist time-broker
          rm dist/time-broker

          GOOS=linux GOARCH=amd64 go build -ldflags "$XFLAGS" -o dist/time-broker ./cmd/time-broker/
          tar -czf "dist/time-broker-${TAG}-linux-amd64.tar.gz" -C dist time-broker
          rm dist/time-broker

          GOOS=windows GOARCH=amd64 go build -ldflags "$XFLAGS" -o dist/time-broker.exe ./cmd/time-broker/
          tar -czf "dist/time-broker-${TAG}-windows-amd64.tar.gz" -C dist time-broker.exe
          rm dist/time-broker.exe

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
