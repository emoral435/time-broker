name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Read version
        id: version
        run: echo "v=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v$(cat VERSION)" >/dev/null 2>&1; then
            echo "error: tag v$(cat VERSION) already exists"
            exit 1
          fi

      - name: Sync frontend version
        run: |
          jq --arg v "$(cat VERSION)" '.version = $v' frontend/package.json > tmp.json && mv tmp.json frontend/package.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build release binaries
        run: |
          VERSION="${{ steps.version.outputs.v }}"
          LDFLAGS="-X main.Version=${VERSION#v}"
          if [ -n "${{ secrets.GOOGLE_CLIENT_ID }}" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/emoral435/time-broker/internal/provider/google.ClientID=${{ secrets.GOOGLE_CLIENT_ID }}'"
          fi
          if [ -n "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/emoral435/time-broker/internal/provider/google.ClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}'"
          fi
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              target="time-broker-${VERSION}-${os}-${arch}"
              GOOS=${os} GOARCH=${arch} go build -ldflags "${LDFLAGS}" -o "dist/time-broker" ./cmd/time-broker/
              tar czf "dist/${target}.tar.gz" -C dist "time-broker"
            done
          done
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o "dist/time-broker.exe" ./cmd/time-broker/
          tar czf "dist/time-broker-${VERSION}-windows-amd64.tar.gz" -C dist "time-broker.exe"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.v }}
          files: dist/*
          generate_release_notes: true
